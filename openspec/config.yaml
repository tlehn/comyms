schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

rules:
  tasks:
    - Always include a task to run `make build` and verify it succeeds
    - Always include a task to run all unit tests (`make test`) and verify they pass
    - Always include a task to run `make lint` and verify there are no lint issues
    - Always include a task to run `make format` and verify the code is properly formatted
